<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHUC88 - ARAM Mayhem Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c8aa6e;
            --dark-bg: #0a0a0c;
            --card-bg: #1e2328;
            --border-color: #3c3c41;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            height: 100%;
            overflow-x: hidden;
        }

        /* --- MÀN HÌNH ĐĂNG NHẬP --- */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Mordekaiser_13.jpg'); /* Mordekaiser Siêu Phẩm - "Tư Bản" */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: rgba(30, 35, 40, 0.9);
            padding: 30px;
            border: 2px solid var(--primary-gold);
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 20px rgba(200, 170, 110, 0.4);
        }

        .login-box h1 { color: var(--primary-gold); margin-bottom: 20px; }
        
        input[type="password"], input[type="text"] {
            padding: 12px;
            width: 250px;
            border: 1px solid var(--primary-gold);
            background: #1a1c21;
            color: white;
            border-radius: 5px;
            outline: none;
        }

        .btn-gold {
            background: var(--primary-gold);
            color: black;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-gold:hover { background: #e1b34a; }

        /* --- MÀN HÌNH TRA CỨU --- */
        #main-content { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }

        .header { text-align: center; border-bottom: 2px solid var(--primary-gold); padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { color: var(--primary-gold); letter-spacing: 5px; }

        .search-container { text-align: center; margin-bottom: 40px; }

        /* --- CHI TIẾT TƯỚNG --- */
        #detail-view { display: none; animation: fadeIn 0.5s; }
        
        .champ-info-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; background: var(--card-bg); padding: 20px; border-radius: 10px; border-left: 5px solid var(--primary-gold); }
        .champ-icon-large { width: 100px; height: 100px; border: 2px solid var(--primary-gold); border-radius: 10px; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .info-card { background: var(--card-bg); padding: 20px; border: 1px solid var(--border-color); border-radius: 8px; }
        .info-card h3 { color: var(--primary-gold); border-bottom: 1px solid #444; padding-bottom: 10px; }
        .info-card ul { list-style: none; padding: 0; }
        .info-card li { padding: 8px 0; border-bottom: 1px solid #2a2a2e; color: #ccc; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .back-btn { cursor: pointer; color: var(--primary-gold); margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>PHUC88</h1>
            <p>Vui lòng nhập mã truy cập</p>
            <input type="password" id="passwordInput" placeholder="Mật khẩu..." onkeydown="if(event.key==='Enter') checkPass()">
            <br>
            <button class="btn-gold" onclick="checkPass()">TRUY CẬP</button>
        </div>
    </div>

    <div id="main-content">
        <div class="header">
            <h1>PHUC88 - ARAM MAYHEM</h1>
        </div>

        <div id="search-view">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Nhập tên tướng (ví dụ: Mordekaiser)..." oninput="liveSearch()">
                <p style="color: #888; margin-top: 10px;">Nhập đúng tên tiếng Anh để lấy hình ảnh từ Riot API</p>
            </div>
            <div id="search-results" class="grid-container">
                </div>
        </div>

        <div id="detail-view">
            <div class="back-btn" onclick="goBack()">← Quay lại tìm kiếm</div>
            <div id="detail-content"></div>
        </div>
    </div>

    <script>
        // --- 1. DỮ LIỆU TƯỚNG (Bạn có thể thêm tướng mới tại đây) ---
        const championData = {
            "Mordekaiser": {
                name: "Mordekaiser",
                build: ["Trượng Pha Lê Rylai", "Quyền Trượng Ác Thần", "Giáp Tâm Linh", "Giáp Gai", "Mặt Nạ Đọa Đày Liandry"],
                augments: ["Siêu Công Nghệ", "Khổng Lồ Hóa", "Hỏa Khuẩn", "Vòng Tròn Tử Vong"],
                runes: ["Chinh Phục", "Đắc Thắng", "Kháng Hiệu Ứng", "Chốt Chặn Cuối Cùng"]
            },
            "Aali": {
                name: "Akali",
                build: ["Quyền Trượng Ác Thần", "Ngọn Ngọn Đuốc Icathia", "Mặt Nạ Đọa Đày"],
                augments: ["Sát Thủ Săn Đuổi", "Kiếm Phép"],
                runes: ["Sốc Điện", "Tác Động Bất Chợt"]
            }
            // Thêm tướng khác theo cấu trúc này
        };

        // --- 2. LOGIC BẢO MẬT ---
        function checkPass() {
            const pass = document.getElementById('passwordInput').value;
            if (pass === "123456") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else {
                alert("Sai mật khẩu rồi bạn ơi!");
            }
        }

        // --- 3. LOGIC TÌM KIẾM ---
        function liveSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const resultsContainer = document.getElementById('search-results');
            resultsContainer.innerHTML = "";

            if (query === "") return;

            for (let key in championData) {
                if (key.toLowerCase().includes(query)) {
                    const champ = championData[key];
                    // Link ảnh từ Riot API
                    const imgUrl = `https://ddragon.leagueoflegends.com/cdn/14.8.1/img/champion/${key}.png`;
                    
                    const card = document.createElement('div');
                    card.className = "info-card";
                    card.style.cursor = "pointer";
                    card.innerHTML = `
                        <div style="display:flex; align-items:center; gap:15px;">
                            <img src="${imgUrl}" style="width:50px; border-radius:5px; border:1px solid gold;">
                            <strong style="color:var(--primary-gold)">${champ.name}</strong>
                        </div>
                    `;
                    card.onclick = () => showDetail(key);
                    resultsContainer.appendChild(card);
                }
            }
        }

        // --- 4. HIỂN THỊ CHI TIẾT ---
        function showDetail(key) {
            const champ = championData[key];
            const detailView = document.getElementById('detail-view');
            const searchView = document.getElementById('search-view');
            const content = document.getElementById('detail-content');
            const imgUrl = `https://ddragon.leagueoflegends.com/cdn/14.8.1/img/champion/${key}.png`;

            searchView.style.display = 'none';
            detailView.style.display = 'block';

            content.innerHTML = `
                <div class="champ-info-header">
                    <img src="${imgUrl}" class="champ-icon-large" onerror="this.src='https://via.placeholder.com/100?text=No+Img'">
                    <h2>Thông tin: ${champ.name}</h2>
                </div>
                <div class="grid-container">
                    <div class="info-card">
                        <h3>Lối lên đồ (Items)</h3>
                        <ul>${champ.build.map(item => `<li>${item}</li>`).join('')}</ul>
                    </div>
                    <div class="info-card">
                        <h3>Ngọc/Lõi hợp (Augments)</h3>
                        <ul>${champ.augments.map(aug => `<li>${aug}</li>`).join('')}</ul>
                    </div>
                    <div class="info-card">
                        <h3>Ngọc bổ trợ</h3>
                        <ul>${champ.runes.map(rune => `<li>${rune}</li>`).join('')}</ul>
                    </div>
                </div>
            `;
        }

        function goBack() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('search-view').style.display = 'block';
        }
    </script>
</body>
</html>
